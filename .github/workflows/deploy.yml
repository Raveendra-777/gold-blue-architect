name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - run: npm install
      - run: npm run build
      - name: Deploy
        uses: actions/deploy-pages@v4
        with:
          path: dist
